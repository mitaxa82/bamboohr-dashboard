<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BambooHR Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #06070d;
  --surface: #0d1117;
  --surface2: #161b22;
  --border: #21262d;
  --border2: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --accent2: #3d8bcd;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --teal: #39d353;
  --radius: 10px;
  --font: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.setup { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: radial-gradient(ellipse at 50% 0%, #0d2137 0%, var(--bg) 70%); }
.setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 420px; }
.setup-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.setup-logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #1a3a5c, #0d2137); border: 1px solid var(--accent2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.setup-logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.setup-logo p { color: var(--muted); font-size: 12px; margin-top: 2px; }
label { display: block; color: var(--muted); font-size: 12px; font-weight: 500; margin-bottom: 6px; margin-top: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
input, select { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,.1); }
input::placeholder { color: var(--muted); }
.hint { color: var(--muted); font-size: 11px; margin-top: 5px; }
.error-box { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.3); border-radius: 8px; padding: 10px 14px; margin-top: 14px; font-size: 13px; color: #f85149; display: none; }
.btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; border: none; margin-top: 10px; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #79bcff; }
.btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }
.loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; display: none; }
.pulse-ring { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--accent); animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.dashboard { display: none; min-height: 100vh; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
.sidebar-logo { padding: 20px 20px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.sidebar-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #1a3a5c, #0d2137); border: 1px solid var(--accent2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.sidebar-logo span { font-weight: 700; font-size: 15px; letter-spacing: -0.2px; }
.sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; color: var(--muted); font-weight: 500; font-size: 13px; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); background: rgba(88,166,255,.1); }
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
.conn-badge { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; background: var(--surface2); font-size: 12px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
.conn-dot.demo { background: var(--orange); }
.main { margin-left: 220px; min-height: 100vh; }
.topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); position: sticky; top: 0; z-index: 50; }
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.topbar-sub { color: var(--muted); font-size: 12px; margin-top: 1px; }
.content { padding: 28px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; transition: border-color .2s; }
.kpi-card:hover { border-color: var(--border2); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--kpi-color, var(--accent)), transparent); }
.kpi-icon { font-size: 18px; margin-bottom: 10px; }
.kpi-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; font-family: var(--mono); }
.kpi-label { color: var(--muted); font-size: 12px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
.kpi-trend { font-size: 11px; margin-top: 6px; font-family: var(--mono); }
.kpi-trend.up { color: var(--green); }
.kpi-trend.neutral { color: var(--muted); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-card.full { grid-column: 1 / -1; }
.chart-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.table-head-title { font-size: 14px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: var(--bg); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--text); }
td { padding: 11px 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,.02); }
.avatar { width: 30px; height: 30px; background: linear-gradient(135deg, #1a3a5c, #0a1f35); border: 1px solid var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); margin-right: 10px; flex-shrink: 0; font-family: var(--mono); }
.flex-row { display: flex; align-items: center; }
.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; font-family: var(--mono); }
.pill-green { background: rgba(63,185,80,.1); color: var(--green); border: 1px solid rgba(63,185,80,.2); }
.pill-gray { background: rgba(139,148,158,.1); color: var(--muted); border: 1px solid rgba(139,148,158,.15); }
.pill-orange { background: rgba(210,153,34,.1); color: var(--orange); border: 1px solid rgba(210,153,34,.2); }
.pill-blue { background: rgba(88,166,255,.1); color: var(--accent); border: 1px solid rgba(88,166,255,.2); }
.pill::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.search-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.search-row input, .search-row select { flex: 1; min-width: 150px; margin: 0; }
.search-input-wrap { position: relative; flex: 1.5; min-width: 200px; }
.search-input-wrap input { padding-left: 36px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.section-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-label::before { content: ''; width: 3px; height: 14px; border-radius: 2px; background: var(--accent); display: block; }
.onboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.onboard-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; transition: border-color .2s; }
.onboard-card:hover { border-color: var(--border2); }
.onboard-av { width: 40px; height: 40px; background: linear-gradient(135deg, #1a3a5c, #0a1f35); border: 1px solid var(--accent2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--accent); flex-shrink: 0; font-family: var(--mono); }
.onboard-av.off { background: linear-gradient(135deg, #2a1010, #1a0a0a); border-color: rgba(248,81,73,.3); color: var(--red); }
.onboard-name { font-weight: 600; font-size: 13px; }
